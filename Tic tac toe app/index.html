<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tic Tac Toe Game</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#667eea,#764ba2);

}



.game{

    width:360px;

    padding:25px;

    text-align:center;

    border-radius:25px;

    background:
    rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    color:white;

    box-shadow:
    0 20px 50px
    rgba(0,0,0,.4);

    animation:show .7s ease;

}


@keyframes show{

from{
    transform:scale(.5);
    opacity:0;
}

to{
    transform:scale(1);
    opacity:1;
}

}


h1{

    margin-bottom:15px;

}


select{

    padding:10px;

    border-radius:10px;

    margin-bottom:15px;

}



.board{

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:12px;

    margin:20px 0;

}



.cell{

    width:95px;
    height:95px;

    background:white;

    border-radius:15px;

    color:#764ba2;

    font-size:50px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.3s;

}



.cell:hover{

    transform:scale(1.1);

    background:#00e5ff;

}



button{

    padding:12px 30px;

    border:none;

    border-radius:20px;

    background:#00c853;

    color:white;

    cursor:pointer;

    font-size:18px;

}



button:hover{

    transform:scale(1.1);

}



</style>

</head>




<body>


<div class="game">


<h1>Tic Tac Toe</h1>


<select id="mode"
onchange="resetGame()">

<option value="player">
Player vs Player
</option>

<option value="computer">
Player vs Computer
</option>


</select>


<h2 id="status">
Player X Turn
</h2>


<div class="board">


<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>


</div>


<button onclick="resetGame()">

Restart

</button>


</div>





<script>


let cells =
document.querySelectorAll(".cell");


let statusText =
document.getElementById("status");



let board =
["","","","","","","","",""];



let player="X";


let running=true;




// Winning Patterns


const wins=[

[0,1,2],
[3,4,5],
[6,7,8],

[0,3,6],
[1,4,7],
[2,5,8],

[0,4,8],
[2,4,6]

];





// Click Events


cells.forEach((cell,index)=>{


cell.addEventListener(
"click",
()=>{


playerMove(index);


});


});







function playerMove(index){


if(
board[index]!=="" ||
!running
)

return;



board[index]=player;


cells[index].innerHTML =
player;



checkWinner();




if(
running &&
document.getElementById("mode").value==="computer"
&&
player==="O"
){


setTimeout(
computerMove,500
);


}



}






function computerMove(){


let empty=[];



board.forEach((value,i)=>{


if(value==="")

empty.push(i);


});



let random =

empty[
Math.floor(
Math.random()*empty.length
)
];



board[random]="O";


cells[random].innerHTML="O";



checkWinner();



}








function checkWinner(){


let won=false;



for(let pattern of wins){



let a=pattern[0];

let b=pattern[1];

let c=pattern[2];



if(

board[a] &&
board[a]===board[b] &&
board[a]===board[c]

){


won=true;


break;


}



}





if(won){


statusText.innerHTML =
`Player ${player} Wins 🎉`;


running=false;

return;


}





if(!board.includes("")){


statusText.innerHTML =
"Game Draw 😐";


running=false;

return;


}





player =
player==="X" ? "O":"X";



statusText.innerHTML =
`Player ${player} Turn`;



}









function resetGame(){


board =
["","","","","","","","",""];



player="X";


running=true;


statusText.innerHTML =
"Player X Turn";



cells.forEach(cell=>{


cell.innerHTML="";


});


}



</script>


</body>

</html>
